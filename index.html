<!DOCTYPE html>
<html>

<head>
    <title>JSON Project IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #252526;
            --sidebar: #333333;
            --accent: #007acc;
            --border: #444;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: #cccccc;
            overflow: hidden;
        }

        /* Layout */
        #toolbar {
            height: 40px;
            padding: 0 20px;
            background: var(--panel);
            display: flex;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 240px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #sidebar-header {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
        }

        #new-resource-zone {
            padding: 10px;
            display: flex;
            gap: 5px;
            background: #2d2d2d;
        }

        #resource-list {
            flex: 1;
            overflow-y: auto;
        }

        .resource-item {
            padding: 8px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            transition: 0.1s;
        }

        .resource-item:hover {
            background: #2a2d2e;
        }

        .resource-item.active {
            background: #37373d;
            color: white;
            border-left: 3px solid var(--accent);
        }

        .item-actions {
            display: flex;
            gap: 8px;
            opacity: 0.4;
            transition: 0.2s;
        }

        .resource-item:hover .item-actions {
            opacity: 1;
        }

        .action-link {
            text-decoration: none;
            font-size: 10px;
            color: var(--accent);
            font-weight: bold;
        }

        .btn-del {
            color: #888;
            font-weight: bold;
            padding: 0 4px;
        }

        .btn-del:hover {
            color: #ff4444;
        }

        /* Editor & Panel */
        #editor {
            flex: 1;
            min-width: 0;
        }

        #side-panel {
            width: 380px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }

        .panel-header {
            padding: 10px 15px;
            background: #2d2d2d;
            font-size: 11px;
            font-weight: bold;
            color: #888;
            border-bottom: 1px solid var(--border);
        }

        /* UI Elements */
        input,
        select {
            background: #3c3c3c;
            color: white;
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 2px;
            outline: none;
            font-size: 12px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover {
            filter: brightness(1.2);
        }

        #output {
            margin: 0;
            padding: 12px;
            flex: 1;
            background: #1a1a1a;
            color: #9cdcfe;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            overflow: auto;
            white-space: pre-wrap;
        }

        .status-msg {
            font-size: 11px;
            color: #888;
            margin-left: auto;
        }
    </style>
</head>

<body>
    <div id="toolbar">
        <strong>JSON IDE</strong>
        <span id="current-file-label" style="color: #61afef; font-size: 13px; font-family: monospace;"></span>
        <button onclick="saveFullFile()" id="save-btn" style="background: #28a745;">Save (Ctrl+S)</button>
        <button onclick="openSchemaModal()" id="schema-btn" style="background: #6f42c1;">Set Schema</button>
        <span id="schema-indicator" class="status-msg" style="color: #6f42c1;"></span>
        <span id="status" class="status-msg"></span>
    </div>

    <div id="schema-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:var(--panel); padding:20px; border-radius:4px; width:600px; max-height:80vh; display:flex; flex-direction:column; gap:15px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold; font-size:14px;">JSON Schema for <span id="schema-resource-name"></span></span>
                <button onclick="closeSchemaModal()" style="background:#444;">✕</button>
            </div>
            <div id="schema-editor" style="flex:1; min-height:300px; border:1px solid var(--border);"></div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button onclick="deleteSchema()" id="delete-schema-btn" style="background:#dc3545;">Delete Schema</button>
                <button onclick="saveSchema()" style="background:#28a745;">Save Schema</button>
            </div>
            <div id="schema-status" class="status-msg"></div>
        </div>
    </div>

    <div id="main">
        <div id="sidebar">
            <div id="sidebar-header">Resources</div>
            <div id="new-resource-zone">
                <input type="text" id="new-proj-input" placeholder="resource_name..." style="width: 100%;">
                <button onclick="createNewProject()">+</button>
            </div>
            <div id="resource-list"></div>
        </div>

        <div id="editor"></div>

        <div id="side-panel">
            <div class="panel-header">TRANSFORMATION (LODASH SUPPORTED)</div>
            <div style="padding: 15px; display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="query" placeholder="_.filter(data, {status: 'Active'})" oninput="runTransform()">
                <div style="display: flex; gap: 8px;">
                    <button onclick="saveQuery()" style="flex: 1; background: #444;">Cache</button>
                    <select id="queryHistory" onchange="loadQuery(this.value)" style="flex: 2;">
                        <option value="">Recent Queries...</option>
                    </select>
                </div>
            </div>
            <div class="panel-header">RESULT PREVIEW</div>
            <pre id="output"></pre>
        </div>
    </div>

    <script>
        let editor;
        let schemaEditor;
        let activeProject = '';
        const CACHE_KEY = 'json_transform_cache';

        // Initialize Monaco
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: "[]",
                language: 'json',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 13,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                lineNumbersMinChars: 3
            });

            // Set up Ctrl+S shortcut
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => saveFullFile());

            updateHistoryUI();
            refreshProjectList().then(() => {
                // Load default or first resource
                const lastProj = localStorage.getItem('last_active_resource');
                if (lastProj) {
                    loadProject(lastProj);
                }
            });
        });

        async function refreshProjectList() {
            try {
                const res = await fetch('/api/v1/resources');
                const resources = await res.json();

                const list = document.getElementById('resource-list');
                list.innerHTML = resources.map(p => `
                    <div class="resource-item ${p === activeProject ? 'active' : ''}" onclick="loadProject('${p}')">
                        <span>${p}.json</span>
                        <div class="item-actions">
                            <a href="/docs/${p}" target="_blank" class="action-link" onclick="event.stopPropagation()">DOCS</a>
                            <span class="btn-del" onclick="event.stopPropagation(); deleteProject('${p}')">×</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Failed to fetch resources", e);
            }
        }

        async function createNewProject() {
            const name = document.getElementById('new-proj-input').value.trim().replace('.json', '');
            if (!name) return;

            // Create file with empty array
            await fetch(`/api/v1/${name}/bulk/update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify([])
            });

            document.getElementById('new-proj-input').value = '';
            await refreshProjectList();
            loadProject(name);
        }

        async function deleteProject(name) {
            if (!confirm(`Permanently delete ${name}.json?`)) return;
            await fetch(`/api/v1/resources/${name}`, { method: 'DELETE' });
            if (activeProject === name) activeProject = '';
            refreshProjectList();
            editor.setValue("[]");
        }

        async function loadProject(name) {
            activeProject = name;
            localStorage.setItem('last_active_resource', name);
            document.getElementById('current-file-label').innerText = `/${name}.json`;

            const res = await fetch(`/api/v1/${name}`);
            const data = await res.json();

            editor.setValue(JSON.stringify(data, null, 4));
            refreshProjectList();
            runTransform();
            checkSchema();
        }

        async function checkSchema() {
            try {
                const res = await fetch(`/api/v1/${activeProject}/schema`);
                if (res.ok) {
                    document.getElementById('schema-indicator').innerText = '✓ Schema';
                } else {
                    document.getElementById('schema-indicator').innerText = '';
                }
            } catch (e) {
                document.getElementById('schema-indicator').innerText = '';
            }
        }

        async function saveFullFile() {
            if (!activeProject) return;
            const content = editor.getValue();

            try {
                JSON.parse(content);
            } catch (e) {
                document.getElementById('status').innerText = "❌ Invalid JSON";
                return;
            }

            const btn = document.getElementById('save-btn');
            const status = document.getElementById('status');

            btn.innerText = "Saving...";
            status.innerText = "";

            try {
                const res = await fetch(`/api/v1/${activeProject}/bulk/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: content
                });

                if (res.ok) {
                    btn.innerText = "Save (Ctrl+S)";
                    status.innerText = "✅ Saved " + new Date().toLocaleTimeString();
                } else {
                    const err = await res.json();
                    btn.innerText = "Save (Ctrl+S)";
                    status.innerText = "❌ " + (err.detail || 'Save Failed');
                }
            } catch (e) {
                btn.innerText = "Save (Ctrl+S)";
                status.innerText = "❌ Save Failed";
            }
        }

        function runTransform() {
            const outputElement = document.getElementById('output');
            try {
                const query = String(document.getElementById('query').value || "").trim();
                const data = JSON.parse(editor.getValue());

                if (!query) {
                    outputElement.innerText = JSON.stringify(data, null, 2);
                    return;
                }

                // Injecting Lodash (_) and data into a temporary function
                const transformFunc = new Function('data', '_', `
                    try {
                        return eval(\`${query}\`);
                    } catch (e) {
                        return "Logic Error: " + e.message;
                    }
                `);

                const result = transformFunc(data, _);
                outputElement.innerText = typeof result === 'string' ? result : JSON.stringify(result, null, 2);
                outputElement.style.color = "#9cdcfe";
            } catch (e) {
                outputElement.innerText = "// Syntax Error: " + e.message;
                outputElement.style.color = "#f44747";
            }
        }

        // --- Transformation Cache Logic ---
        function saveQuery() {
            const q = document.getElementById('query').value;
            if (!q) return;
            let cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');
            cache = [q, ...cache.filter(x => x !== q)].slice(0, 15);
            localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
            updateHistoryUI();
        }

        function loadQuery(val) {
            if (!val) return;
            document.getElementById('query').value = val;
            runTransform();
        }

        function updateHistoryUI() {
            const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');
            const select = document.getElementById('queryHistory');
            select.innerHTML = '<option value="">Recent Queries...</option>' +
                cache.map(q => `<option value="${q}">${q.substring(0, 40)}${q.length > 40 ? '...' : ''}</option>`).join('');
        }

        async function openSchemaModal() {
            if (!activeProject) return;
            document.getElementById('schema-resource-name').innerText = activeProject;
            document.getElementById('schema-modal').style.display = 'flex';

            if (!schemaEditor) {
                require(['vs/editor/editor.main'], function () {
                    schemaEditor = monaco.editor.create(document.getElementById('schema-editor'), {
                        value: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \n  }\n}",
                        language: 'json',
                        theme: 'vs-dark',
                        automaticLayout: true,
                        fontSize: 13,
                        minimap: { enabled: false }
                    });
                    loadSchema();
                });
            } else {
                loadSchema();
            }
        }

        function closeSchemaModal() {
            document.getElementById('schema-modal').style.display = 'none';
        }

        async function loadSchema() {
            try {
                const res = await fetch(`/api/v1/${activeProject}/schema`);
                if (res.ok) {
                    const schema = await res.json();
                    schemaEditor.setValue(JSON.stringify(schema, null, 4));
                    document.getElementById('schema-indicator').innerText = '✓ Schema';
                } else {
                    schemaEditor.setValue("{\n  \"type\": \"object\",\n  \"properties\": {\n    \n  }\n}");
                    document.getElementById('schema-indicator').innerText = '';
                }
            } catch (e) {
                schemaEditor.setValue("{\n  \"type\": \"object\",\n  \"properties\": {\n    \n  }\n}");
                document.getElementById('schema-indicator').innerText = '';
            }
        }

        async function saveSchema() {
            const content = schemaEditor.getValue();
            const status = document.getElementById('schema-status');

            try {
                JSON.parse(content);
            } catch (e) {
                status.innerText = "❌ Invalid JSON";
                return;
            }

            try {
                const res = await fetch(`/api/v1/${activeProject}/schema`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: content
                });

                if (res.ok) {
                    status.innerText = "✅ Schema saved";
                    document.getElementById('schema-indicator').innerText = '✓ Schema';
                } else {
                    const err = await res.json();
                    status.innerText = "❌ " + (err.detail || 'Failed to save schema');
                }
            } catch (e) {
                status.innerText = "❌ Save failed";
            }
        }

        async function deleteSchema() {
            if (!confirm('Delete schema for this resource?')) return;

            try {
                const res = await fetch(`/api/v1/${activeProject}/schema`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    document.getElementById('schema-status').innerText = "✅ Schema deleted";
                    document.getElementById('schema-indicator').innerText = '';
                    closeSchemaModal();
                }
            } catch (e) {
                document.getElementById('schema-status').innerText = "❌ Delete failed";
            }
        }
    </script>
</body>

</html>
