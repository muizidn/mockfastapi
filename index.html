<!DOCTYPE html>
<html>
<head>
    <title>MockAPI - Project Selection</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #252526;
            --accent: #007acc;
            --text: #cccccc;
            --border: #444;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 40px;
        }
        .project-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .project-title {
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .project-desc {
            margin-top: 8px;
            color: #888;
            font-size: 14px;
        }
        .project-meta {
            margin-top: 12px;
            font-size: 12px;
            color: #666;
        }
        .project-actions {
            display: flex;
            gap: 10px;
        }
        .project-actions button {
            background: #444;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .project-actions button:hover {
            background: #555;
        }
        .project-actions button.delete {
            background: #dc3545;
        }
        .project-actions button.delete:hover {
            background: #c82333;
        }
        .create-form {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .create-form h3 {
            margin-top: 0;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #888;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary:hover {
            background: #0098ff;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .empty-state h2 {
            margin-bottom: 10px;
        }
        #edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #edit-modal > div {
            background: var(--panel);
            padding: 25px;
            border-radius: 8px;
            width: 500px;
        }
        #edit-modal h3 {
            margin-top: 0;
        }
        #edit-modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        #edit-modal .btn-cancel {
            background: #444;
        }
        .header-bar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-bar h2 {
            margin: 0;
            font-size: 18px;
        }
        .header-bar a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <h2>MockAPI</h2>
        <a href="/resources">Go to Resources →</a>
    </div>
    <div class="container">
        <h1>Projects</h1>
        <p class="subtitle">Manage your API mock projects. Each project has its own resources and data.</p>

        <div class="create-form">
            <h3>Create New Project</h3>
            <div class="form-group">
                <label>Project ID</label>
                <input type="text" id="project-id" placeholder="my-project">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="project-title" placeholder="My Awesome Project">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="project-desc" placeholder="A brief description of this project..."></textarea>
            </div>
            <button class="btn-primary" onclick="createProject()">Create Project</button>
        </div>

        <div id="project-list"></div>
    </div>

    <div id="edit-modal">
        <div>
            <h3>Edit Project</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="edit-title">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="edit-desc"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-primary" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let projects = [];

        async function loadProjects() {
            const res = await fetch('/api/v1/projects');
            projects = await res.json();
            renderProjects();
        }

        function renderProjects() {
            const list = document.getElementById('project-list');
            if (projects.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <h2>No projects yet</h2>
                        <p>Create your first project above to get started.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = projects.map(p => `
                <div class="project-card" onclick="selectProject('${p.id}')">
                    <div class="project-header">
                        <div>
                            <div class="project-title">${escapeHtml(p.title || p.id)}</div>
                            <div class="project-desc">${escapeHtml(p.description || 'No description')}</div>
                            <div class="project-meta">ID: ${escapeHtml(p.id)}</div>
                        </div>
                        <div class="project-actions" onclick="event.stopPropagation()">
                            <button onclick="editProject('${p.id}')">Edit</button>
                            <button class="delete" onclick="deleteProject('${p.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        async function createProject() {
            const id = document.getElementById('project-id').value.trim();
            const title = document.getElementById('project-title').value.trim();
            const description = document.getElementById('project-desc').value.trim();

            if (!id) {
                alert('Project ID is required');
                return;
            }

            if (!/^[a-zA-Z0-9_-]+$/.test(id)) {
                alert('Project ID can only contain letters, numbers, underscores, and hyphens');
                return;
            }

            try {
                const res = await fetch('/api/v1/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, title, description })
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert(err.detail || 'Failed to create project');
                    return;
                }

                document.getElementById('project-id').value = '';
                document.getElementById('project-title').value = '';
                document.getElementById('project-desc').value = '';
                loadProjects();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function selectProject(projectId) {
            localStorage.setItem('active_project', projectId);
            window.location.href = '/resources';
        }

        function editProject(id) {
            const p = projects.find(x => x.id === id);
            if (!p) return;
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-title').value = p.title || '';
            document.getElementById('edit-desc').value = p.description || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value.trim();
            const description = document.getElementById('edit-desc').value.trim();

            try {
                const res = await fetch(`/api/v1/projects/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert(err.detail || 'Failed to update project');
                    return;
                }

                closeEditModal();
                loadProjects();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function deleteProject(id) {
            if (!confirm(`Delete project "${id}"? This will delete all resources and data in this project.`)) {
                return;
            }

            try {
                const res = await fetch(`/api/v1/projects/${id}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert(err.detail || 'Failed to delete project');
                    return;
                }

                if (localStorage.getItem('active_project') === id) {
                    localStorage.removeItem('active_project');
                }

                loadProjects();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        loadProjects();
    </script>
</body>
</html>
